<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Drama Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3d;
  --accent:#ff4e7a;--accent2:#c084fc;--accent3:#38bdf8;
  --text:#e8e8f0;--muted:#6b6b8a;--gold:#f0c060;
  --sidebar:200px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 10% 30%,rgba(255,78,122,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 90% 70%,rgba(192,132,252,.06) 0%,transparent 60%);}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh;position:relative;z-index:1;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden;
  flex-shrink:0;
}
.sidebar-logo{
  padding:22px 16px 18px;
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.logo-hangul{font-family:'Noto Serif KR',serif;font-size:1.8rem;font-weight:300;color:var(--accent);line-height:1;text-shadow:0 0 30px rgba(255,78,122,.4);}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text);line-height:1;}
.logo-sub{font-size:.52rem;color:var(--muted);letter-spacing:.2em;margin-top:2px;}

.sidebar-stats{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px;
}
.stat-row{display:flex;align-items:center;justify-content:space-between;}
.stat-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--accent);font-weight:300;line-height:1;}

.sidebar-nav{flex:1;padding:10px 0;}
.nav-label{font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;padding:10px 16px 6px;}

.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 16px;cursor:pointer;
  transition:all .18s;border-left:3px solid transparent;
  font-size:.7rem;letter-spacing:.04em;color:var(--muted);
  white-space:nowrap;overflow:hidden;
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);}
.nav-item.active{color:var(--text);border-left-color:var(--accent);background:rgba(255,78,122,.07);}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-count{margin-left:auto;font-size:.55rem;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:1px 6px;color:var(--muted);}
.nav-item.active .nav-count{background:rgba(255,78,122,.15);border-color:rgba(255,78,122,.3);color:var(--accent);}

.sidebar-add{padding:14px 16px;border-top:1px solid var(--border);}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}

.topbar{
  padding:18px 24px;border-bottom:1px solid var(--border);
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:300px;}
.search-wrap::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none;}
input[type="text"],select{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.76rem;padding:8px 12px 8px 34px;
  border-radius:6px;width:100%;outline:none;transition:border-color .2s;
}
select{padding-left:12px;}
input[type="text"]:focus,select:focus{border-color:var(--accent);}
select option{background:var(--surface);}

.platform-heading{
  padding:24px 24px 16px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.plat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.plat-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:.06em;}
.plat-count{font-size:.62rem;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:3px 10px;}

.content-area{padding:20px 24px 40px;flex:1;overflow-y:auto;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 28px rgba(255,78,122,.14);}
.card-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--surface);}
.card-poster img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.card:hover .card-poster img{transform:scale(1.05);}
.poster-upload-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;z-index:5;gap:6px;}
.card:hover .poster-upload-overlay{opacity:1;}
.poster-upload-btn{background:rgba(255,78,122,.85);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.57rem;padding:5px 10px;border-radius:4px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
.platform-badge{position:absolute;top:7px;left:7px;padding:3px 7px;border-radius:4px;font-size:.48rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#fff;z-index:3;}
.status-badge{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;border:2px solid var(--card);z-index:3;}
.status-badge.watching{background:#22c55e;box-shadow:0 0 6px #22c55e;}
.status-badge.completed{background:var(--accent3);}
.status-badge.plan{background:var(--muted);}
.status-badge.dropped{background:var(--accent);}
.score-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 9px 7px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:flex-end;justify-content:space-between;z-index:3;}
.score{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--gold);line-height:1;}
.stars{font-size:.55rem;color:var(--gold);}
.card-body{padding:9px 10px 11px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:1px;line-height:1.3;}
.card-english{font-size:.58rem;color:var(--muted);margin-bottom:6px;line-height:1.2;}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:.48rem;padding:2px 5px;border-radius:3px;background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.card-eps{font-size:.54rem;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}
.progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}

/* add card */
.add-card{background:var(--surface);border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;min-height:240px;color:var(--muted);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;}
.add-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,78,122,.04);}
.add-icon{width:36px;height:36px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .2s;}
.add-card:hover .add-icon{transform:rotate(90deg);}

/* BTN */
.btn{background:var(--accent);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.72rem;padding:8px 16px;border-radius:6px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.btn:hover{background:#ff6b90;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-delete{background:transparent;border:1px solid rgba(255,78,122,.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:.72rem;padding:8px 16px;border-radius:6px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.btn-delete:hover{background:rgba(255,78,122,.15);border-color:var(--accent);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:transparent;}
.btn-sm{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.66rem;padding:7px 14px;border-radius:6px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;width:100%;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:30px;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:20px;color:var(--accent);}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-bottom:4px;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:8px 12px;border-radius:6px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.poster-drop-area{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;}
.poster-drop-area:hover{border-color:var(--accent);background:rgba(255,78,122,.04);}
.poster-drop-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.poster-preview{width:60px;height:90px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:none;}
.poster-preview.visible{display:block;}
.drop-text{font-size:.66rem;color:var(--muted);line-height:1.5;}
.drop-text span{color:var(--accent);}
.url-toggle{font-size:.58rem;color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'DM Mono',monospace;padding:0;margin-top:2px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:.7rem;color:var(--text);z-index:300;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="K-Drama">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-hangul">한</span>
      <span class="logo-title">K-Drama</span>
      <span class="logo-sub">Registro personal</span>
    </div>

    <div class="sidebar-stats">
      <div class="stat-row"><span class="stat-label">Total</span><span class="stat-val" id="statTotal">0</span></div>
      <div class="stat-row"><span class="stat-label">Viendo</span><span class="stat-val" id="statWatching">0</span></div>
      <div class="stat-row"><span class="stat-label">Completados</span><span class="stat-val" id="statDone">0</span></div>
      <div class="stat-row"><span class="stat-label">Por ver</span><span class="stat-val" id="statPlan">0</span></div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Plataformas</div>
      <div id="navItems"></div>
    </nav>

    <div class="sidebar-add">
      <button class="btn-sm" onclick="openModal()">+ Agregar drama</button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar drama...">
      </div>
      <select id="statusFilter" style="width:130px">
        <option value="all">Todos</option>
        <option value="watching">Viendo</option>
        <option value="completed">Completados</option>
        <option value="plan">Por ver</option>
        <option value="dropped">Abandonados</option>
      </select>
      <select id="sortSelect" style="width:140px">
        <option value="date">Recién agregados</option>
        <option value="title">Título A–Z</option>
        <option value="year">Año</option>
        <option value="score">Puntuación</option>
      </select>
    </div>

    <div class="platform-heading" id="platHeading">
      <div class="plat-dot" id="platDot"></div>
      <span class="plat-name" id="platName"></span>
      <span class="plat-count" id="platCount"></span>
    </div>

    <div class="content-area">
      <div class="grid" id="dramaGrid"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nuevo K-Drama</div>
    <form onsubmit="saveDrama(event)">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Título en español</label>
        <input class="form-input" type="text" id="fTitle" required placeholder="ej. Reina de lágrimas">
      </div>
      <div class="form-group">
        <label class="form-label">Título en inglés</label>
        <input class="form-input" type="text" id="fEnglish" placeholder="ej. Queen of Tears">
      </div>
      <div class="form-group">
        <label class="form-label">Poster</label>
        <div class="poster-drop-area">
          <input type="file" id="fPosterFile" accept="image/*" onchange="handleFile(event)">
          <img class="poster-preview" id="posterPreview" src="" alt="">
          <div class="drop-text" id="dropText"><span>Clic o arrastra</span> imagen<br><small>JPG · PNG · WEBP</small></div>
        </div>
        <button type="button" class="url-toggle" onclick="toggleUrl()">↓ usar URL</button>
        <div id="urlWrap" style="display:none;margin-top:6px">
          <input class="form-input" type="url" id="fPosterUrl" placeholder="https://..." oninput="previewUrl(this.value)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Plataforma</label>
          <select class="form-input" id="fPlatform">
            <option value="Netflix">Netflix</option>
            <option value="Viki">Viki</option>
            <option value="Disney+">Disney+</option>
            <option value="Prime Video">Prime Video</option>
            <option value="HBO Max">HBO Max</option>
            <option value="Doramasia">Doramasia</option>
            <option value="DoramasFlix">DoramasFlix</option>
            <option value="DoramasYT">DoramasYT</option>
            <option value="Doramasmp4">Doramasmp4</option>
            <option value="">Sin plataforma</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Año</label>
          <input class="form-input" type="number" id="fYear" placeholder="2024" min="1990" max="2030">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-input" id="fStatus">
            <option value="plan">Por ver</option>
            <option value="watching">Viendo</option>
            <option value="completed">Completado</option>
            <option value="dropped">Abandonado</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Puntuación</label>
          <input class="form-input" type="number" id="fScore" min="1" max="10" step="0.5" placeholder="8.5">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Episodios totales</label>
          <input class="form-input" type="number" id="fEpTotal" placeholder="16">
        </div>
        <div class="form-group">
          <label class="form-label">Episodios vistos</label>
          <input class="form-input" type="number" id="fEpWatched" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Géneros</label>
        <input class="form-input" type="text" id="fGenres" placeholder="Romance, Drama">
      </div>
      <div class="form-actions">
        <button type="button" class="btn-delete" id="btnDelete" style="display:none" onclick="deleteDrama()">🗑 Eliminar</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
const PCOLORS = {
  'Netflix':'#e50914','Viki':'#1da0f2','Disney+':'#113ccf',
  'Prime Video':'#00a8e0','HBO Max':'#9747ff','Doramasia':'#e8403a',
  'DoramasFlix':'#ff7b00','DoramasYT':'#cc0000','Doramasmp4':'#22c55e',
  '':'#8b8baa'
};
const PORDER = ['Netflix','Viki','Disney+','Prime Video','HBO Max','Doramasia','DoramasFlix','DoramasYT','Doramasmp4',''];
const STATUS_LABELS = {watching:'Viendo',completed:'Completado',plan:'Por ver',dropped:'Abandonado'};

/* tus dramas registrados */
// ── localStorage persistence ──
const STORAGE_KEY = 'kdrama_registry_v3';

const DEFAULT_DRAMAS = [];

function loadDramas() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // If saved data has at least as many dramas as defaults, use it
      if (parsed.length >= DEFAULT_DRAMAS.length) return parsed;
      // Otherwise merge: keep saved updates, add any new defaults
      const savedIds = new Set(parsed.map(d => d.id));
      const merged = [...parsed, ...DEFAULT_DRAMAS.filter(d => !savedIds.has(d.id))];
      return merged;
    }
  } catch(e) {}
  return [...DEFAULT_DRAMAS];
}

function saveDramas() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(myDramas)); } catch(e) {}
}

let myDramas = loadDramas();
let nextId = Math.max(100, ...[0].concat(myDramas.map(d=>d.id||0))) + 1;
let currentPosterData = '';
let activePlatform = 'Netflix';
let activeSection = 'platform'; // 'platform' or 'completed'

function allDramas() { return myDramas; }

/* ── build sidebar nav ── */
// Fixed platform list always shown
const FIXED_PLATFORMS = [
  {key:'Netflix',      label:'Netflix'},
  {key:'Prime Video',  label:'Prime Video'},
  {key:'Disney+',      label:'Disney+'},
  {key:'Viki',         label:'Viki'},
  {key:'DoramasFlix', label:'DoramasFlix'},
  {key:'Doramasia',    label:'Doramasia'},
  {key:'Doramasmp4',   label:'Doramasmp4'},
  {key:'DoramasYT',    label:'DoramasYT'},
  {key:'',             label:'K-Dramas'},
];

function buildNav() {
  const all = allDramas();
  const counts = {};
  all.forEach(d => {
    const k = d.platform !== undefined ? d.platform : '';
    counts[k] = (counts[k]||0) + 1;
  });

  // Also add "Completados" section count
  const doneCount = all.filter(d => d.status === 'completed').length;

  const nav = document.getElementById('navItems');
  let navHtml = '';

  // Fixed platforms
  FIXED_PLATFORMS.forEach(p => {
    const color = PCOLORS[p.key]||'#8b8baa';
    const count = counts[p.key] || 0;
    const isActive = activePlatform === p.key && activeSection === 'platform';
    navHtml += `<div class="nav-item${isActive?' active':''}" onclick="selectPlatform('${p.key.replace(/'/g,"\'")}')" data-plat="${p.key}">
      <span class="nav-dot" style="background:${color}"></span>
      <span style="overflow:hidden;text-overflow:ellipsis">${p.label}</span>
      <span class="nav-count">${count}</span>
    </div>`;
  });

  // Separator + Completados
  navHtml += `<div style="margin:10px 16px 6px;font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;">Historial</div>`;
  navHtml += `<div class="nav-item${activeSection==='completed'?' active':''}" onclick="selectCompleted()">
    <span class="nav-dot" style="background:var(--accent3)"></span>
    <span style="overflow:hidden;text-overflow:ellipsis">Completados</span>
    <span class="nav-count">${doneCount}</span>
  </div>`;

  nav.innerHTML = navHtml;
}

function selectPlatform(p) {
  activePlatform = p;
  activeSection = 'platform';
  buildNav();
  renderGrid();
}

function selectCompleted() {
  activeSection = 'completed';
  buildNav();
  renderGrid();
}

function renderGrid() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('statusFilter').value;
  const so = document.getElementById('sortSelect').value;

  const all = allDramas();

  // stats
  document.getElementById('statTotal').textContent    = all.length;
  document.getElementById('statWatching').textContent = myDramas.filter(d=>d.status==='watching').length;
  document.getElementById('statDone').textContent     = myDramas.filter(d=>d.status==='completed').length;
  document.getElementById('statPlan').textContent     = myDramas.filter(d=>d.status==='plan').length;

  // filter based on active section
  // Completed dramas ONLY show in Completados section, never in platform sections
  let list = all.filter(d => {
    const plat = d.platform !== undefined ? d.platform : '';
    const mQ = !q || d.title.toLowerCase().includes(q) || (d.english||'').toLowerCase().includes(q);
    if (activeSection === 'completed') {
      return d.status === 'completed' && mQ;
    }
    // In platform sections: never show completed dramas
    if (d.status === 'completed') return false;
    const mP = plat === activePlatform;
    const mS = st==='all' || d.status===st;
    return mP && mQ && mS;
  });

  // sort
  if(so==='title') list.sort((a,b)=>a.title.localeCompare(b.title));
  else if(so==='year') list.sort((a,b)=>(b.year||0)-(a.year||0));
  else if(so==='score') list.sort((a,b)=>(b.score||0)-(a.score||0));

  // platform heading
  let headColor, headLabel;
  if (activeSection === 'completed') {
    headColor = 'var(--accent3)';
    headLabel = 'Completados';
  } else {
    const fp = FIXED_PLATFORMS.find(p => p.key === activePlatform);
    headLabel = fp ? fp.label : (activePlatform || 'K-Dramas');
    headColor = PCOLORS[activePlatform]||'#8b8baa';
  }
  document.getElementById('platDot').style.background  = headColor;
  document.getElementById('platName').textContent       = headLabel;
  document.getElementById('platName').style.color       = headColor;
  document.getElementById('platCount').textContent      = `${list.length} dramas`;

  const grid = document.getElementById('dramaGrid');

  if(list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">
      <span style="font-family:'Noto Serif KR',serif;font-size:2.5rem;opacity:.2;display:block;margin-bottom:10px">드라마</span>
      No hay dramas aquí.
    </div>`;
    return;
  }

  grid.innerHTML = list.map((d,i)=>cardHTML(d,i)).join('') +
    `<div class="add-card" onclick="openModal()"><div class="add-icon">+</div><span>Agregar</span></div>`;
}

function starsStr(s){if(!s)return'';const f=Math.floor(s/2),h=(s/2)-f>=.5?1:0;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(5-f-h);}

function cardHTML(d, i) {
  const pct   = d.epTotal ? Math.round((d.epWatched/d.epTotal)*100) : 0;
  const color = PCOLORS[d.platform||'']||'#8b8baa';
  const src   = d.poster || `https://placehold.co/175x262/1a1a26/6b6b8a?text=${encodeURIComponent((d.title||'').slice(0,3))}`;
  const isMy = true; // all dramas are editable
  return `<div class="card" style="animation-delay:${Math.min(i*.025,.5)}s" ondblclick="${isMy?`editDrama(${d.id})`:''}">
    <div class="card-poster">
      <img src="${src}" alt="${d.title}" loading="lazy" onerror="this.src='https://placehold.co/175x262/1a1a26/6b6b8a?text=Sin+poster'">
      <div class="platform-badge" style="background:${color}">${d.platform||'?'}</div>
      <div class="status-badge ${d.status}"></div>
      ${isMy?`<div class="poster-upload-overlay">
        <label class="poster-upload-btn">📷 Cambiar foto<input type="file" style="display:none" accept="image/*" onchange="uploadPoster(event,${d.id})"></label>
        <span style="font-size:.48rem;color:rgba(255,255,255,.5)">doble clic → editar</span>
      </div>`:''}
      ${d.score?`<div class="score-overlay"><span class="score">${d.score}</span><span class="stars">${starsStr(d.score)}</span></div>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${d.title}</div>
      ${d.english&&d.english!==d.title?`<div class="card-english">${d.english}</div>`:''}
      <div class="card-meta">
        ${d.year?`<span class="tag">${d.year}</span>`:''}
        <span class="tag" style="color:${d.status==='watching'?'#22c55e':d.status==='completed'?'var(--accent3)':d.status==='dropped'?'var(--accent)':'var(--muted)'}">${STATUS_LABELS[d.status]||d.status}</span>
        ${(d.genres||[]).slice(0,1).map(g=>`<span class="tag">${g}</span>`).join('')}
      </div>
      ${d.epTotal?`<div class="card-eps"><span>${d.epWatched||0}/${d.epTotal} ep</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
    </div>
  </div>`;
}

function uploadPoster(event, id) {
  const file = event.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => { myDramas = myDramas.map(d=>d.id===id?{...d,poster:e.target.result}:d); saveDramas(); renderGrid(); };
  r.readAsDataURL(file);
}

/* MODAL */
function openModal(id=null) {
  resetModal();
  if(id) {
    const d = myDramas.find(x=>x.id===id); if(!d) return; // find in combined array
    document.getElementById('editId').value    = d.id;
    document.getElementById('fTitle').value    = d.title;
    document.getElementById('fEnglish').value  = d.english||'';
    document.getElementById('fPlatform').value = d.platform||'';
    document.getElementById('fYear').value     = d.year||'';
    document.getElementById('fStatus').value   = d.status;
    document.getElementById('fScore').value    = d.score||'';
    document.getElementById('fEpTotal').value  = d.epTotal||'';
    document.getElementById('fEpWatched').value= d.epWatched||'';
    document.getElementById('fGenres').value   = (d.genres||[]).join(', ');
    if(d.poster){currentPosterData=d.poster;showPreview(d.poster);}
    document.getElementById('modalTitle').textContent='Editar Drama';
    document.getElementById('btnDelete').style.display='block';
  } else {
    document.getElementById('fPlatform').value = activePlatform;
    document.getElementById('modalTitle').textContent='Nuevo K-Drama';
    document.getElementById('btnDelete').style.display='none';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function editDrama(id){ openModal(id); }

function resetModal(){
  currentPosterData='';
  ['editId','fTitle','fEnglish','fPosterUrl','fYear','fScore','fEpTotal','fEpWatched','fGenres'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
  document.getElementById('fStatus').value='plan';
  document.getElementById('fPosterFile').value='';
  document.getElementById('posterPreview').classList.remove('visible');
  document.getElementById('posterPreview').src='';
  document.getElementById('dropText').style.display='flex';
  document.getElementById('urlWrap').style.display='none';
  document.getElementById('btnDelete').style.display='none';
}
function showPreview(src){
  document.getElementById('posterPreview').src=src;
  document.getElementById('posterPreview').classList.add('visible');
  document.getElementById('dropText').style.display='none';
}
function handleFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{currentPosterData=ev.target.result;showPreview(ev.target.result);};r.readAsDataURL(file);}
function previewUrl(v){if(!v)return;currentPosterData=v;showPreview(v);}
function toggleUrl(){const w=document.getElementById('urlWrap');w.style.display=w.style.display==='none'?'block':'none';}
function deleteDrama(){
  const eid = parseInt(document.getElementById('editId').value)||null;
  if(!eid) return;
  if(!confirm('¿Segura que quieres eliminar este drama?')) return;
  myDramas = myDramas.filter(d => d.id !== eid);
  saveDramas();
  closeModal();
  buildNav();
  renderGrid();
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeOnOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function saveDrama(e){
  e.preventDefault();
  const eid=parseInt(document.getElementById('editId').value)||null;
  const url=document.getElementById('fPosterUrl').value.trim();
  const drama={
    id:eid||nextId++,
    title:document.getElementById('fTitle').value.trim(),
    english:document.getElementById('fEnglish').value.trim(),
    poster:currentPosterData||url||'',
    platform:document.getElementById('fPlatform').value,
    year:parseInt(document.getElementById('fYear').value)||null,
    status:document.getElementById('fStatus').value,
    score:parseFloat(document.getElementById('fScore').value)||null,
    epTotal:parseInt(document.getElementById('fEpTotal').value)||0,
    epWatched:parseInt(document.getElementById('fEpWatched').value)||0,
    genres:document.getElementById('fGenres').value.split(',').map(g=>g.trim()).filter(Boolean),
    dateAdded:eid?(myDramas.find(d=>d.id===eid)?.dateAdded||Date.now()):Date.now()
  };
  myDramas = eid ? myDramas.map(d=>d.id===eid?drama:d) : [drama,...myDramas];
  saveDramas();
  // If completed, jump to completados section; otherwise go to its platform
  if (drama.status === 'completed') {
    activeSection = 'completed';
  } else {
    activeSection = 'platform';
    if(!eid) activePlatform = drama.platform || '';
  }
  closeModal();
  buildNav();
  renderGrid();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.getElementById('searchInput').addEventListener('input',renderGrid);
document.getElementById('statusFilter').addEventListener('change',renderGrid);
document.getElementById('sortSelect').addEventListener('change',renderGrid);

buildNav();
renderGrid();

// ── Register Service Worker for PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .catch(e => console.log('SW error:', e));
}
</script>
