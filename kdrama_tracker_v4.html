<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d14;--sb:#13131f;--card:#1a1a2e;--card2:#20203a;--accent:#e84393;--text:#f0f0f8;--muted:#7777aa;--border:#252540;--gold:#f5c842}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:700px;max-height:700px;display:flex;overflow:hidden}
#sb{width:195px;min-width:195px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:16px 14px 10px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-family:'Noto Serif KR',serif;font-size:15px;background:linear-gradient(135deg,#e84393,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3}
.sb-logo small{font-size:9px;color:var(--muted)}
.sb-addbtn{display:block;margin:10px 12px 4px;padding:9px;background:linear-gradient(135deg,#e84393,#9b59b6);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center}
.sb-addbtn:hover{opacity:.85}
.sb-sec{padding:8px 0}
.sb-sec-title{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:2px 14px 5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-left:2px solid transparent;font-size:12px;color:var(--muted);transition:all .12s;white-space:nowrap;overflow:hidden}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-item.active{background:rgba(232,67,147,.1);color:var(--accent);border-left-color:var(--accent)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-cnt{margin-left:auto;font-size:9px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:6px;color:var(--muted);flex-shrink:0}
.sb-item.active .sb-cnt{background:rgba(232,67,147,.2);color:var(--accent)}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--sb);flex-shrink:0}
#topbar h2{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#srch{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;width:160px;font-family:'DM Sans',sans-serif}
#srch:focus{outline:none;border-color:var(--accent)}
#srt{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
#statsbar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px;text-align:center}
.stat-n{font-size:16px;font-weight:600;color:var(--accent)}
.stat-l{font-size:9px;color:var(--muted);margin-top:1px}
#gw{flex:1;overflow-y:auto;padding:14px 18px}
#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:12px}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ico{font-size:40px;margin-bottom:10px}
.dcard{background:var(--card);border-radius:11px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .14s,box-shadow .14s;position:relative}
.dcard:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.45)}
.dcard-bar{height:3px;width:100%}
.dcard-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--card2)}
.dcard-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#161628,#1e1e36);font-size:34px}
.dcard-body{padding:8px}
.dcard-title{font-family:'Noto Serif KR',serif;font-size:11px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.dcard-en{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.dcard-meta{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.badge{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:500}
.b-type{background:rgba(155,89,182,.2);color:#c39bd3}
.b-star{background:rgba(245,200,66,.12);color:var(--gold)}
.b-year{background:rgba(255,255,255,.06);color:var(--muted)}
.dcard-plats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.plat-chip{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600}
.dcard-prog{margin-top:2px}
.pbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#e84393,#9b59b6);border-radius:2px}
.ptxt{font-size:8px;color:var(--muted);margin-top:2px}
.cbtn{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s}
.cbtn:hover{background:rgba(46,204,113,.3);border-color:#2ecc71}
.done-badge{position:absolute;top:7px;left:7px;background:#2ecc71;color:#000;font-size:7px;font-weight:700;padding:2px 5px;border-radius:3px}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
#ov.open{display:flex}
#mdl{background:var(--card);border-radius:16px;width:100%;max-width:560px;border:1px solid var(--border);position:relative;margin:auto}
.mdl-close{position:absolute;top:11px;right:11px;background:var(--card2);border:none;color:var(--muted);font-size:15px;cursor:pointer;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:5}
.mdl-close:hover{color:var(--text)}
.mdl-hdr{padding:18px 18px 0;display:flex;gap:14px;align-items:flex-start}
.img-area{flex-shrink:0;position:relative;cursor:pointer}
.m-img{width:90px;aspect-ratio:2/3;border-radius:9px;object-fit:cover;background:var(--card2);display:none;cursor:pointer}
.m-ph{width:90px;aspect-ratio:2/3;border-radius:9px;background:linear-gradient(135deg,#161628,#1e1e36);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:2px dashed var(--border);transition:border-color .15s}
.m-ph:hover,.m-img:hover{border-color:var(--accent);opacity:.85}
.m-cambiar{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);background:var(--accent);border:none;color:#fff;font-size:9px;padding:2px 7px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;pointer-events:none}
.mdl-titles{flex:1;min-width:0}
.cbar{height:4px;border-radius:2px;margin-bottom:8px;transition:background .25s}
.mdl-body{padding:12px 18px 18px}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--muted);margin:10px 0 4px;letter-spacing:.5px;text-transform:uppercase}
.mdl-body input,.mdl-body select,.mdl-body textarea,.mdl-hdr input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.mdl-body input:focus,.mdl-body select:focus,.mdl-body textarea:focus,.mdl-hdr input:focus{border-color:var(--accent)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.prow-m{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:6px}
.prow-fill{height:100%;background:linear-gradient(90deg,#e84393,#9b59b6);border-radius:2px;transition:width .3s}
.ptxt-m{font-size:9px;color:var(--muted);margin-top:2px}
.type-row{display:flex;gap:6px;margin-top:4px}
.tbtn{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:10px;color:var(--muted);text-align:center;transition:all .14s;font-family:'DM Sans',sans-serif;background:transparent}
.tbtn.sel{border-color:var(--accent);color:var(--accent);background:rgba(232,67,147,.1)}
.stars{display:flex;gap:3px;margin-top:4px}
.star{font-size:21px;cursor:pointer;color:var(--border);transition:color .08s;user-select:none}
.star.on{color:var(--gold)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.tag{padding:3px 8px;border-radius:16px;font-size:10px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .13s;background:transparent;font-family:'DM Sans',sans-serif}
.tag.sg{background:rgba(232,67,147,.18);border-color:var(--accent);color:var(--accent)}
.mdl-acts{display:flex;gap:6px;margin-top:16px}
.btn-sv{flex:1;padding:10px;background:linear-gradient(135deg,#e84393,#9b59b6);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-co{flex:1;padding:10px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);border-radius:9px;color:#2ecc71;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-dl{padding:10px 13px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:9px;color:#e74c3c;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
/* orden badge */
.ep-order-badge{position:absolute;top:7px;left:7px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:rgba(232,67,147,.85);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="sb">
  <div class="sb-logo">
    <h1>K·Drama<br>Tracker</h1>
    <small>✦ Mi colección</small>
  </div>
  <button class="sb-addbtn" id="btn-add">+ Agregar Drama</button>
  <div class="sb-sec">
    <div class="sb-sec-title">Viendo</div>
    <div class="sb-item" id="nav-all"><span style="font-size:12px">🎬</span><span>Todos</span><span class="sb-cnt" id="cnt-all">0</span></div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-title">Plataformas</div>
    <div id="plat-nav"></div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-title">Estado</div>
    <div class="sb-item" id="nav-done"><span style="font-size:12px">✅</span><span>Completados</span><span class="sb-cnt" id="cnt-done">0</span></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Todos los Dramas</h2>
    <input id="srch" type="text" placeholder="Buscar...">
    <select id="srt">
      <option value="recent">Recientes</option>
      <option value="rating">Calificación</option>
      <option value="az">A → Z</option>
      <option value="year">Año</option>
    </select>
  </div>
  <div id="statsbar"></div>
  <div id="gw"><div id="gallery"></div></div>
</div>

<div id="ov">
<div id="mdl">
  <button class="mdl-close" id="mdl-close">✕</button>
  <div class="mdl-hdr">
    <div class="img-area" id="img-area">
      <div class="m-ph" id="m-ph">🎭</div>
      <img class="m-img" id="m-img" alt="">
      <span class="m-cambiar">📷 Cambiar</span>
    </div>
    <div class="mdl-titles" style="padding-top:2px">
      <div class="cbar" id="cbar"></div>
      <input type="text" id="f-es" placeholder="Título en Español *" style="font-size:14px;font-weight:600;margin-bottom:6px">
      <input type="text" id="f-en" placeholder="Title in English">
    </div>
  </div>
  <div class="mdl-body">
    <div class="lbl">Año / Episodio actual / Total episodios</div>
    <div class="g3">
      <input type="number" id="f-yr" placeholder="2024" min="1990" max="2030">
      <input type="number" id="f-ep" placeholder="Ep. actual" min="0">
      <input type="number" id="f-tot" placeholder="Total eps" min="1">
    </div>
    <div class="prow-m"><div class="prow-fill" id="mpf" style="width:0%"></div></div>
    <div class="ptxt-m" id="mpt">0%</div>
    <div class="lbl">Tipo</div>
    <div class="type-row">
      <div class="tbtn" id="tb-s" data-type="Serie">📺 Serie</div>
      <div class="tbtn" id="tb-p" data-type="Película">🎬 Película</div>
      <div class="tbtn" id="tb-t" data-type="TV Show">🎙 TV Show</div>
    </div>
    <div class="lbl">Calificación</div>
    <div class="stars" id="stars"></div>
    <div class="lbl">Géneros</div>
    <div class="tags" id="gtags"></div>
    <div class="lbl">Plataformas</div>
    <div class="tags" id="ptags"></div>
    <div class="lbl">Notas</div>
    <textarea id="f-notes" rows="2" placeholder="Comentarios..."></textarea>
    <div class="mdl-acts">
      <button class="btn-sv" id="btn-sv">💾 Guardar</button>
      <button class="btn-co" id="btn-co">✅ Completado</button>
      <button class="btn-dl" id="btn-dl" style="display:none">🗑</button>
    </div>
  </div>
</div>
</div>
<input type="file" id="file-inp" accept="image/*" style="display:none">

<script>
const PLATS=[
  {id:'netflix',name:'Netflix',color:'#E50914'},
  {id:'prime',name:'Prime Video',color:'#00A8E1'},
  {id:'disney',name:'Disney+',color:'#113CCF'},
  {id:'viki',name:'Viki',color:'#1D9BD1'},
  {id:'doramasia',name:'Doramasia',color:'#9B59B6'},
  {id:'doramasmp4',name:'DoramasMp4',color:'#E67E22'},
  {id:'doramasflix',name:'DoramasFlix',color:'#2ECC71'},
  {id:'doramasyt',name:'DoramasYT',color:'#FF0000'},
];
const GENRES=['Romance','Comedia','Drama','Thriller','Acción','Misterio','Histórico','Fantasía','Horror','Slice of Life','Político','Médico','Deportes','Musical'];
const PAL=['#e84393','#9b59b6','#3498db','#1abc9c','#e67e22','#e74c3c','#f39c12','#2ecc71','#1D9BD1','#e91e63','#00bcd4','#8bc34a'];

let dramas=[],filter='all',editId=null;
let mRating=0,mGenres=[],mPlats=[],mType='Serie',mImg=null;

const $=id=>document.getElementById(id);
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h);}
const tColor=t=>t?PAL[hash(t)%PAL.length]:'#e84393';

async function load(){
  try{const r=await window.storage.get('kdrama_v3',true);if(r&&r.value)dramas=JSON.parse(r.value);}
  catch(e){dramas=[];}
  renderAll();
}
async function persist(){try{await window.storage.set('kdrama_v3',JSON.stringify(dramas),true);}catch(e){}}

function renderAll(){sidebar();stats();gallery();}

function sidebar(){
  const nav=$('plat-nav');nav.innerHTML='';
  PLATS.forEach(p=>{
    const cnt=dramas.filter(d=>!d.completed&&(d.platforms||[]).includes(p.id)).length;
    const el=document.createElement('div');
    el.className='sb-item'+(filter===p.id?' active':'');
    el.id='nav-'+p.id;
    el.innerHTML=`<span class="sb-dot" style="background:${p.color}"></span><span style="overflow:hidden;text-overflow:ellipsis">${p.name}</span><span class="sb-cnt">${cnt}</span>`;
    el.addEventListener('click',()=>setFilter(p.id));
    nav.appendChild(el);
  });
  $('cnt-all').textContent=dramas.filter(d=>!d.completed).length;
  $('cnt-done').textContent=dramas.filter(d=>d.completed).length;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  ($('nav-'+filter)||$('nav-all')).classList.add('active');
}

function stats(){
  const w=dramas.filter(d=>!d.completed).length;
  const done=dramas.filter(d=>d.completed).length;
  const rated=dramas.filter(d=>d.rating>0);
  const avg=rated.length?(rated.reduce((a,b)=>a+b.rating,0)/rated.length).toFixed(1):0;
  $('statsbar').innerHTML=`
    <div class="stat"><div class="stat-n">${w}</div><div class="stat-l">Viendo</div></div>
    <div class="stat"><div class="stat-n" style="color:#2ecc71">${done}</div><div class="stat-l">Completados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--gold)">${avg>0?'⭐'+avg:'—'}</div><div class="stat-l">Rating</div></div>`;
}

/* ── ORDEN: plataforma específica → por ep asc; "all" y "done" → por el selector ── */
function getList(){
  const q=($('srch').value||'').toLowerCase();
  const sort=$('srt').value;
  const isPlatFilter=PLATS.some(p=>p.id===filter);

  let list=dramas.filter(d=>{
    if(filter==='all')return !d.completed;
    if(filter==='done')return d.completed;
    return !d.completed&&(d.platforms||[]).includes(filter);
  }).filter(d=>!q||(d.titleEs||'').toLowerCase().includes(q)||(d.titleEn||'').toLowerCase().includes(q));

  if(isPlatFilter){
    // orden fijo: menor a mayor capítulo actual
    list.sort((a,b)=>(a.ep||0)-(b.ep||0));
  } else {
    // orden elegido por el usuario (en "Todos" y "Completados")
    if(sort==='rating')list.sort((a,b)=>(b.rating||0)-(a.rating||0));
    else if(sort==='az')list.sort((a,b)=>(a.titleEs||'').localeCompare(b.titleEs||''));
    else if(sort==='year')list.sort((a,b)=>(b.year||0)-(a.year||0));
    else list.sort((a,b)=>b.id.localeCompare(a.id));
  }
  return list;
}

function platChipsHTML(platforms){
  return(platforms||[]).map(pid=>{
    const p=PLATS.find(x=>x.id===pid);if(!p)return'';
    return`<span class="plat-chip" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}55">${p.name}</span>`;
  }).join('');
}

function gallery(){
  const g=$('gallery'),list=getList();
  const isPlatFilter=PLATS.some(p=>p.id===filter);
  $('page-title').textContent=
    filter==='done'?'✅ Completados':
    filter==='all'?'Todos los Dramas':
    (PLATS.find(p=>p.id===filter)?.name||'');
  // mostrar/ocultar selector solo cuando no es plataforma
  $('srt').style.display=isPlatFilter?'none':'';

  if(!list.length){
    g.innerHTML=`<div class="empty"><div class="ico">🎭</div><p>${filter==='done'?'Aún no completaste ningún drama':'Agrega tu primer drama aquí ✦'}</p></div>`;
    return;
  }
  g.innerHTML='';
  list.forEach((d,idx)=>g.appendChild(card(d,isPlatFilter,idx+1)));
}

function card(d,showOrder,orderNum){
  const pct=d.epTotal>0?Math.round(d.ep/d.epTotal*100):0;
  const col=tColor(d.titleEs);
  const typeIcon=d.type==='Película'?'🎬':d.type==='TV Show'?'🎙':'📺';
  const chips=platChipsHTML(d.platforms);

  const el=document.createElement('div');
  el.className='dcard';
  el.innerHTML=`
    <div class="dcard-bar" style="background:${col}"></div>
    ${d.img?`<img class="dcard-img" src="${d.img}" loading="lazy">`:`<div class="dcard-ph">🎭</div>`}
    ${d.completed?'<div class="done-badge">✓ COMPLETO</div>':''}
    ${showOrder&&!d.completed?`<div class="ep-order-badge">Ep ${d.ep||0}</div>`:''}
    ${!d.completed?`<button class="cbtn" data-id="${d.id}">✓</button>`:''}
    <div class="dcard-body">
      <div class="dcard-title">${d.titleEs||'Sin título'}</div>
      ${d.titleEn?`<div class="dcard-en">${d.titleEn}</div>`:''}
      <div class="dcard-meta">
        ${d.type?`<span class="badge b-type">${typeIcon} ${d.type}</span>`:''}
        ${d.rating?`<span class="badge b-star">⭐${d.rating}</span>`:''}
        ${d.year?`<span class="badge b-year">${d.year}</span>`:''}
      </div>
      ${chips?`<div class="dcard-plats">${chips}</div>`:''}
      ${d.epTotal>0?`<div class="dcard-prog"><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div><div class="ptxt">Ep ${d.ep||0}/${d.epTotal} · ${pct}%</div></div>`:''}
    </div>`;
  el.querySelector('.dcard-body').addEventListener('click',()=>openModal(d.id));
  const imgEl=el.querySelector('.dcard-img,.dcard-ph');
  if(imgEl)imgEl.addEventListener('click',()=>openModal(d.id));
  const cbtn=el.querySelector('.cbtn');
  if(cbtn)cbtn.addEventListener('click',e=>{e.stopPropagation();quickDone(d.id);});
  return el;
}

function quickDone(id){
  const d=dramas.find(x=>x.id===id);
  if(d){d.completed=true;persist();renderAll();}
}
function setFilter(f){filter=f;renderAll();}

/* ── MODAL ── */
function openModal(id){
  editId=id||null;
  const d=id?dramas.find(x=>x.id===id):null;
  mRating=d?.rating||0;mGenres=[...(d?.genres||[])];mPlats=[...(d?.platforms||[])];mType=d?.type||'Serie';mImg=d?.img||null;
  $('f-es').value=d?.titleEs||'';$('f-en').value=d?.titleEn||'';
  $('f-yr').value=d?.year||'';$('f-ep').value=d?.ep||'';$('f-tot').value=d?.epTotal||'';
  $('f-notes').value=d?.notes||'';
  colorBar();progM();renderModalImg();renderStars();renderGTags();renderPTags();renderTypes();
  $('btn-dl').style.display=id?'':'none';
  $('btn-co').style.display=d?.completed?'none':'';
  $('ov').classList.add('open');
}
function closeModal(){$('ov').classList.remove('open');}

function colorBar(){const col=tColor($('f-es').value);$('cbar').style.background=col;$('cbar').style.boxShadow=`0 0 8px ${col}66`;}
function progM(){
  const ep=parseFloat($('f-ep').value)||0,tot=parseFloat($('f-tot').value)||0;
  const pct=tot>0?Math.round(ep/tot*100):0;
  $('mpf').style.width=pct+'%';$('mpt').textContent=pct+'% — Ep '+ep+(tot?'/'+tot:'');
}
function renderModalImg(){
  if(mImg){$('m-ph').style.display='none';$('m-img').style.display='block';$('m-img').src=mImg;}
  else{$('m-ph').style.display='flex';$('m-img').style.display='none';}
}
function renderStars(){
  const row=$('stars');row.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');s.className='star'+(i<=mRating?' on':'');s.textContent='★';
    s.addEventListener('click',()=>{mRating=i;renderStars();});
    s.addEventListener('mouseover',()=>row.querySelectorAll('.star').forEach((el,j)=>el.classList.toggle('on',j<i)));
    s.addEventListener('mouseleave',renderStars);
    row.appendChild(s);
  }
}
function renderGTags(){
  const w=$('gtags');w.innerHTML='';
  GENRES.forEach(g=>{
    const el=document.createElement('button');el.className='tag'+(mGenres.includes(g)?' sg':'');el.textContent=g;
    el.addEventListener('click',()=>{mGenres.includes(g)?mGenres=mGenres.filter(x=>x!==g):mGenres.push(g);renderGTags();});
    w.appendChild(el);
  });
}
function renderPTags(){
  const w=$('ptags');w.innerHTML='';
  PLATS.forEach(p=>{
    const sel=mPlats.includes(p.id);
    const el=document.createElement('button');el.className='tag';
    if(sel){el.style.background=p.color+'22';el.style.borderColor=p.color;el.style.color=p.color;}
    el.innerHTML=`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};margin-right:4px;vertical-align:middle"></span>${p.name}`;
    el.addEventListener('click',()=>{mPlats.includes(p.id)?mPlats=mPlats.filter(x=>x!==p.id):mPlats.push(p.id);renderPTags();});
    w.appendChild(el);
  });
}
function renderTypes(){
  ['tb-s','tb-p','tb-t'].forEach(id=>{const el=$(id);if(el)el.classList.toggle('sel',el.dataset.type===mType);});
}
function saveDrama(){
  const titleEs=$('f-es').value.trim();if(!titleEs){$('f-es').focus();return;}
  const data={id:editId||genId(),titleEs,titleEn:$('f-en').value.trim(),year:parseInt($('f-yr').value)||null,ep:parseInt($('f-ep').value)||0,epTotal:parseInt($('f-tot').value)||0,type:mType,rating:mRating,genres:[...mGenres],platforms:[...mPlats],notes:$('f-notes').value.trim(),img:mImg,completed:editId?(dramas.find(x=>x.id===editId)?.completed||false):false};
  if(editId){const i=dramas.findIndex(x=>x.id===editId);if(i>=0)dramas[i]=data;}else dramas.unshift(data);
  persist();closeModal();renderAll();
}
function deleteDrama(){if(!editId||!confirm('¿Eliminar este drama?'))return;dramas=dramas.filter(x=>x.id!==editId);persist();closeModal();renderAll();}
function markComplete(){if(!editId)return;const d=dramas.find(x=>x.id===editId);if(d){d.completed=true;persist();closeModal();renderAll();}}

$('btn-add').addEventListener('click',()=>openModal());
$('mdl-close').addEventListener('click',closeModal);
$('ov').addEventListener('click',e=>{if(e.target===$('ov'))closeModal();});
$('btn-sv').addEventListener('click',saveDrama);
$('btn-co').addEventListener('click',markComplete);
$('btn-dl').addEventListener('click',deleteDrama);
$('srch').addEventListener('input',gallery);
$('srt').addEventListener('change',gallery);
$('nav-all').addEventListener('click',()=>setFilter('all'));
$('nav-done').addEventListener('click',()=>setFilter('done'));
$('f-es').addEventListener('input',colorBar);
$('f-ep').addEventListener('input',progM);
$('f-tot').addEventListener('input',progM);
$('img-area').addEventListener('click',()=>$('file-inp').click());
$('file-inp').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{mImg=ev.target.result;renderModalImg();};
  r.readAsDataURL(f);e.target.value='';
});
['tb-s','tb-p','tb-t'].forEach(id=>{$(id).addEventListener('click',function(){mType=this.dataset.type;renderTypes();});});

load();
</script>
</body>
</html>
